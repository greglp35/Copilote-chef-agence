name: Audit HTML Metier

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  audit-html-metier:
    name: Audit securite et qualite HTML metier
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Auditer les sources HTML metier
        run: |
          mkdir -p rapports
          python3 <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          import re
          import sys

          report = Path('rapports/audit-html-metier.md')
          now = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')

          src_dir = Path('src')
          html_files = sorted(src_dir.rglob('*.html')) if src_dir.exists() else []
          css_files = sorted(src_dir.rglob('*.css')) if src_dir.exists() else []
          js_files = sorted(src_dir.rglob('*.js')) if src_dir.exists() else []

          errors = []
          warnings = []
          lines = []

          lines.append('# Rapport Audit HTML Metier')
          lines.append('')
          lines.append(f'Date : {now}')
          lines.append('')
          lines.append('## 1. Inventaire')
          lines.append('')
          lines.append(f'- HTML dans /src : {len(html_files)}')
          lines.append(f'- CSS dans /src : {len(css_files)}')
          lines.append(f'- JS dans /src : {len(js_files)}')
          lines.append('')

          if html_files:
              lines.append('### Fichiers HTML')
              for path in html_files:
                  lines.append(f'- `{path}`')
              lines.append('')
          else:
              warnings.append('Aucun fichier HTML detecte dans /src.')

          external_pattern = re.compile(r'(https?://|cdn\.|unpkg\.com|jsdelivr\.net|cdnjs\.cloudflare\.com|googleapis\.com|gstatic\.com|fontawesome|bootstrapcdn|tailwindcss\.com)', re.I)
          secret_pattern = re.compile(r'(password\s*=|motdepasse\s*=|mot_de_passe\s*=|token\s*=|api[_-]?key\s*=|apikey\s*=|client[_-]?secret\s*=|connection[_-]?string\s*=|chaine[_-]?connexion\s*=|jdbc:|dsn=|Bearer\s+[A-Za-z0-9._-]+)', re.I)
          sql_pattern = re.compile(r'(SELECT\s+.*\s+FROM|INSERT\s+INTO|UPDATE\s+.*\s+SET|DELETE\s+FROM|DROP\s+TABLE|CREATE\s+TABLE)', re.I)

          lines.append('## 2. Controle securite applicative')
          lines.append('')
          controlled_paths = []
          for base in ['src', 'data', 'exports']:
              base_path = Path(base)
              if base_path.exists():
                  controlled_paths.extend([p for p in base_path.rglob('*') if p.is_file() and p.suffix.lower() in {'.html', '.css', '.js', '.json', '.csv'}])

          security_matches = []
          sql_matches = []
          for path in sorted(controlled_paths):
              text = path.read_text(encoding='utf-8', errors='ignore')
              for number, line in enumerate(text.splitlines(), start=1):
                  if secret_pattern.search(line):
                      security_matches.append((path, number, line.strip()[:180]))
                  if sql_pattern.search(line):
                      sql_matches.append((path, number, line.strip()[:180]))

          if security_matches:
              lines.append('### Secrets potentiels')
              for path, number, sample in security_matches:
                  lines.append(f'- BLOQUANT : `{path}:{number}` — `{sample}`')
                  errors.append(f'Secret potentiel detecte dans {path}:{number}')
              lines.append('')
          else:
              lines.append('OK : aucun secret evident detecte dans /src, /data ou /exports.')
              lines.append('')

          if sql_matches:
              lines.append('### Logique SQL sensible')
              for path, number, sample in sql_matches:
                  lines.append(f'- BLOQUANT : `{path}:{number}` — `{sample}`')
                  errors.append(f'Logique SQL sensible detectee dans {path}:{number}')
              lines.append('')
          else:
              lines.append('OK : aucune requete SQL sensible detectee dans les sources controlees.')
              lines.append('')

          lines.append('## 3. Dependances externes')
          lines.append('')
          external_matches = []
          for path in html_files + css_files + js_files:
              text = path.read_text(encoding='utf-8', errors='ignore')
              for number, line in enumerate(text.splitlines(), start=1):
                  if external_pattern.search(line):
                      external_matches.append((path, number, line.strip()[:180]))

          if external_matches:
              for path, number, sample in external_matches:
                  lines.append(f'- ALERTE : `{path}:{number}` — `{sample}`')
                  warnings.append(f'Dependance externe ou appel reseau detecte dans {path}:{number}')
          else:
              lines.append('OK : aucune dependance externe detectee dans les sources applicatives.')
          lines.append('')

          lines.append('## 4. Controle UX HTML minimal')
          lines.append('')
          if html_files:
              lines.append('| Fichier | Viewport | Boutons | Sauvegarde | Accessibilite | Print | Export |')
              lines.append('|---|---|---|---|---|---|---|')
              for path in html_files:
                  text = path.read_text(encoding='utf-8', errors='ignore')
                  lower = text.lower()
                  viewport = 'name="viewport"' in lower or "name='viewport'" in lower
                  buttons = '<button' in lower or 'role="button"' in lower or "role='button'" in lower
                  save = 'localstorage' in lower or 'indexeddb' in lower or 'sessionstorage' in lower
                  accessibility = 'aria-' in lower or 'role=' in lower or '<label' in lower or 'alt=' in lower
                  print_ready = 'window.print' in lower or '@media print' in lower
                  export_ready = 'blob' in lower or 'download' in lower or 'filereader' in lower
                  def mark(value):
                      return 'OK' if value else 'A VERIFIER'
                  lines.append(f'| `{path}` | {mark(viewport)} | {mark(buttons)} | {mark(save)} | {mark(accessibility)} | {mark(print_ready)} | {mark(export_ready)} |')
                  if not viewport:
                      warnings.append(f'Viewport absent dans {path}')
                  if not buttons:
                      warnings.append(f'Aucun bouton/action detecte dans {path}')
              lines.append('')
          else:
              lines.append('Controle UX non applicable : aucun fichier HTML dans /src.')
              lines.append('')

          lines.append('## 5. Poids et maintenabilite')
          lines.append('')
          files_for_size = html_files + css_files + js_files
          if files_for_size:
              lines.append('| Fichier | Taille | Lignes | Observation |')
              lines.append('|---|---:|---:|---|')
              for path in files_for_size:
                  text = path.read_text(encoding='utf-8', errors='ignore')
                  size = len(text.encode('utf-8'))
                  line_count = len(text.splitlines())
                  note = 'OK'
                  if size > 500000:
                      note = 'ALERTE : fichier tres lourd'
                      warnings.append(f'Fichier tres lourd : {path}')
                  elif size > 200000 or line_count > 2500:
                      note = 'A surveiller'
                      warnings.append(f'Fichier volumineux : {path}')
                  lines.append(f'| `{path}` | {size} octets | {line_count} | {note} |')
          else:
              lines.append('Aucun fichier applicatif a mesurer.')
          lines.append('')

          lines.append('## 6. Verdict')
          lines.append('')
          if errors:
              lines.append('**ROUGE - audit HTML echoue : correction obligatoire.**')
          elif warnings:
              lines.append('**ORANGE - audit HTML valide avec alertes.**')
          else:
              lines.append('**VERT - audit HTML conforme.**')
          lines.append('')
          lines.append('Ce workflow controle les sources applicatives reelles. Les documents de methode, templates et fiches projet ne sont pas bloques pour des mots de prevention securite.')
          lines.append('')
          lines.append('Validation humaine obligatoire avant diffusion ou production.')
          lines.append('')

          if errors:
              lines.append('### Erreurs')
              for error in errors:
                  lines.append(f'- {error}')
              lines.append('')
          if warnings:
              lines.append('### Alertes')
              for warning in warnings[:40]:
                  lines.append(f'- {warning}')
              if len(warnings) > 40:
                  lines.append(f'- ... {len(warnings) - 40} autres alertes')
              lines.append('')

          report.write_text('\n'.join(lines), encoding='utf-8')
          print('\n'.join(lines[:90]))

          if errors:
              sys.exit(1)
          PY

      - name: Publier le rapport d'audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-audit-html-metier
          path: rapports/audit-html-metier.md
