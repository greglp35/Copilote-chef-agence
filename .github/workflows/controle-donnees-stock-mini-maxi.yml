name: Controle Donnees Stock Mini Maxi

on:
  push:
    branches: [main]
    paths:
      - 'data/stock-mini-maxi*.json'
      - 'data/zonage-agence*.json'
      - 'scripts/export_zones_tfi.py'
      - '.github/workflows/controle-donnees-stock-mini-maxi.yml'
  pull_request:
    branches: [main]
    paths:
      - 'data/stock-mini-maxi*.json'
      - 'data/zonage-agence*.json'
      - 'scripts/export_zones_tfi.py'
      - '.github/workflows/controle-donnees-stock-mini-maxi.yml'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  controle-donnees-stock-mini-maxi:
    name: Verifier stock et zones TFI
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4
      - name: Verifier donnees et generer export TFI
        run: python3 scripts/export_zones_tfi.py
      - name: Publier controle stock TFI
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: controle-donnees-stock-mini-maxi
          path: |
            exports/tfi-zones-articles.csv
            exports/tfi-zones-articles.controle.json
            exports/tfi-zones-articles.rapport.md
