name: Controle Fiche Projet

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'projets/**'
      - 'templates/fiche-projet-template.*'
      - 'docs/METHODE_FICHE_PROJET.md'
      - '.github/workflows/controle-fiche-projet.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'projets/**'
      - 'templates/fiche-projet-template.*'
      - 'docs/METHODE_FICHE_PROJET.md'
      - '.github/workflows/controle-fiche-projet.yml'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  controle-fiche-projet:
    name: Verifier les fiches projet obligatoires
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Controler les fiches projet
        run: |
          mkdir -p rapports
          python3 <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          import json
          import re
          import sys

          report = Path('rapports/controle-fiche-projet.md')
          now = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')

          required_json_fields = [
              'schema_version',
              'project_id',
              'project_name',
              'status',
              'created_at',
              'updated_at',
              'owner',
              'validator',
              'problem_to_solve',
              'target_users',
              'operational_goal',
              'source_files',
              'data_sources',
              'security_rules',
              'expected_features',
              'out_of_scope',
              'success_criteria',
              'risks',
              'human_validation',
              'next_actions'
          ]

          required_security_rules = [
              'no_password_in_html',
              'no_token_in_html',
              'no_as400_credentials_in_html',
              'no_odbc_string_in_html',
              'no_sensitive_sql_in_html',
              'test_data_only',
              'human_validation_required'
          ]

          allowed_status = {'draft', 'in_review', 'validated', 'blocked', 'archived'}
          allowed_risk_levels = {'low', 'medium', 'high', 'blocking'}
          allowed_validation_decisions = {'pending', 'validated', 'needs_correction', 'blocked'}

          errors = []
          warnings = []
          rows = []

          src_dir = Path('src')
          projets_dir = Path('projets')

          html_files = sorted(src_dir.glob('*.html')) if src_dir.exists() else []

          if not projets_dir.exists():
              errors.append('Le dossier /projets est manquant.')

          for html_file in html_files:
              project_id = html_file.stem
              md_file = Path('projets') / f'{project_id}.md'
              json_file = Path('projets') / f'{project_id}.json'
              status = {
                  'html': str(html_file),
                  'project_id': project_id,
                  'md': str(md_file),
                  'json': str(json_file),
                  'md_ok': md_file.is_file(),
                  'json_ok': json_file.is_file(),
                  'project_status': '-',
                  'validation': '-',
                  'blocking_risk': False,
              }

              if not md_file.is_file():
                  errors.append(f'Fiche Markdown manquante pour {html_file} : {md_file}')

              if not json_file.is_file():
                  errors.append(f'Fiche JSON manquante pour {html_file} : {json_file}')
                  rows.append(status)
                  continue

              try:
                  data = json.loads(json_file.read_text(encoding='utf-8'))
              except Exception as exc:
                  errors.append(f'JSON invalide dans {json_file} : {exc}')
                  rows.append(status)
                  continue

              for field in required_json_fields:
                  if field not in data:
                      errors.append(f'Champ obligatoire manquant dans {json_file} : {field}')

              if data.get('project_id') != project_id:
                  errors.append(f'Incoherence project_id dans {json_file} : attendu {project_id}, obtenu {data.get("project_id")}')

              source_files = data.get('source_files', {}) if isinstance(data.get('source_files'), dict) else {}
              if source_files.get('main_html') != str(html_file):
                  errors.append(f'Incoherence main_html dans {json_file} : attendu {html_file}, obtenu {source_files.get("main_html")}')

              if source_files.get('project_markdown') != str(md_file):
                  errors.append(f'Incoherence project_markdown dans {json_file} : attendu {md_file}, obtenu {source_files.get("project_markdown")}')

              if source_files.get('project_json') != str(json_file):
                  errors.append(f'Incoherence project_json dans {json_file} : attendu {json_file}, obtenu {source_files.get("project_json")}')

              project_status = data.get('status')
              status['project_status'] = str(project_status)
              if project_status not in allowed_status:
                  errors.append(f'Statut projet non autorise dans {json_file} : {project_status}')

              security_rules = data.get('security_rules', {}) if isinstance(data.get('security_rules'), dict) else {}
              for rule in required_security_rules:
                  if security_rules.get(rule) is not True:
                      errors.append(f'Regle securite non validee dans {json_file} : {rule}')

              validation = data.get('human_validation', {}) if isinstance(data.get('human_validation'), dict) else {}
              decision = validation.get('decision')
              status['validation'] = str(decision)
              if decision not in allowed_validation_decisions:
                  errors.append(f'Decision de validation non autorisee dans {json_file} : {decision}')

              risks = data.get('risks', []) if isinstance(data.get('risks'), list) else []
              for risk in risks:
                  if not isinstance(risk, dict):
                      errors.append(f'Format de risque invalide dans {json_file}.')
                      continue
                  level = risk.get('level')
                  if level not in allowed_risk_levels:
                      errors.append(f'Niveau de risque non autorise dans {json_file} : {level}')
                  if level == 'blocking':
                      status['blocking_risk'] = True
                      errors.append(f'Risque bloquant detecte dans {json_file} : {risk.get("risk", "risque non nomme")}')

              features = data.get('expected_features', []) if isinstance(data.get('expected_features'), list) else []
              if not features:
                  warnings.append(f'Aucune fonctionnalite attendue documentee dans {json_file}.')

              if len(str(data.get('problem_to_solve', '')).strip()) < 30:
                  warnings.append(f'Probleme terrain trop peu detaille dans {json_file}.')

              if len(str(data.get('operational_goal', '')).strip()) < 30:
                  warnings.append(f'Objectif operationnel trop peu detaille dans {json_file}.')

              rows.append(status)

          orphan_project_files = []
          if projets_dir.exists():
              for file in sorted(projets_dir.glob('*.json')):
                  if not (src_dir / f'{file.stem}.html').exists():
                      orphan_project_files.append(str(file))
              for file in sorted(projets_dir.glob('*.md')):
                  if not (src_dir / f'{file.stem}.html').exists():
                      orphan_project_files.append(str(file))

          for file in orphan_project_files:
              warnings.append(f'Fiche projet orpheline sans HTML correspondant : {file}')

          lines = []
          lines.append('# Rapport Controle Fiche Projet')
          lines.append('')
          lines.append(f'Date : {now}')
          lines.append('')
          lines.append('## 1. Verdict')
          lines.append('')
          if errors:
              lines.append('**ROUGE - controle fiche projet echoue.**')
          elif warnings:
              lines.append('**ORANGE - controle fiche projet valide avec alertes.**')
          else:
              lines.append('**VERT - toutes les applications HTML ont une fiche projet conforme.**')
          lines.append('')

          lines.append('## 2. Fichiers controles')
          lines.append('')
          if rows:
              lines.append('| HTML | Markdown | JSON | Statut projet | Validation | Risque bloquant |')
              lines.append('|---|---|---|---|---|---|')
              for row in rows:
                  lines.append(
                      f"| `{row['html']}` | {'OK' if row['md_ok'] else 'MANQUANT'} | {'OK' if row['json_ok'] else 'MANQUANT'} | {row['project_status']} | {row['validation']} | {'OUI' if row['blocking_risk'] else 'NON'} |"
                  )
          else:
              lines.append('Aucun fichier HTML detecte dans /src.')
          lines.append('')

          lines.append('## 3. Erreurs bloquantes')
          lines.append('')
          if errors:
              for error in errors:
                  lines.append(f'- {error}')
          else:
              lines.append('Aucune erreur bloquante detectee.')
          lines.append('')

          lines.append('## 4. Alertes')
          lines.append('')
          if warnings:
              for warning in warnings:
                  lines.append(f'- {warning}')
          else:
              lines.append('Aucune alerte detectee.')
          lines.append('')

          lines.append('## 5. Regle de decision')
          lines.append('')
          lines.append('Un fichier HTML metier dans /src doit obligatoirement avoir :')
          lines.append('')
          lines.append('- une fiche Markdown lisible humainement ;')
          lines.append('- une fiche JSON valide ;')
          lines.append('- des regles de securite confirmees ;')
          lines.append('- un lien coherent vers le HTML source ;')
          lines.append('- aucun risque de niveau blocking ;')
          lines.append('- une validation humaine explicite avant diffusion.')
          lines.append('')

          report.write_text('\n'.join(lines), encoding='utf-8')
          print('\n'.join(lines[:60]))

          if errors:
              sys.exit(1)
          PY

      - name: Publier le rapport fiche projet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-controle-fiche-projet
          path: rapports/controle-fiche-projet.md
