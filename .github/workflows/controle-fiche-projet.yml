name: Controle Fiche Projet

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'projets/**'
      - 'templates/fiche-projet-template.*'
      - 'docs/METHODE_FICHE_PROJET.md'
      - 'docs/CONTROLE_FICHE_PROJET_OBLIGATOIRE.md'
      - 'scripts/check-fiche-projet.js'
      - 'scripts/test-fiche-projet-check.js'
      - '.github/workflows/controle-fiche-projet.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'projets/**'
      - 'templates/fiche-projet-template.*'
      - 'docs/METHODE_FICHE_PROJET.md'
      - 'docs/CONTROLE_FICHE_PROJET_OBLIGATOIRE.md'
      - 'scripts/check-fiche-projet.js'
      - 'scripts/test-fiche-projet-check.js'
      - '.github/workflows/controle-fiche-projet.yml'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  controle-fiche-projet:
    name: Verifier les fiches projet obligatoires
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Tester le controle fiche projet
        run: node scripts/test-fiche-projet-check.js

      - name: Controler les fiches projet
        run: node scripts/check-fiche-projet.js

      - name: Publier le rapport fiche projet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-controle-fiche-projet
          path: rapports/controle-fiche-projet.md
