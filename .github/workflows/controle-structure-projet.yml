name: Controle Structure Projet

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  controle-structure-projet:
    name: Controle structure, securite et documentation projet
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Controler la structure projet
        run: |
          mkdir -p rapports
          python3 <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          import re
          import sys

          report = Path('rapports/controle-structure-projet.md')
          now = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')

          required_dirs = {
              'docs': 'Documentation, regles, dossiers de reference',
              'src': 'Sources applicatives HTML/CSS/JS',
              'templates': 'Modeles reutilisables',
              'exports': 'Exports generes ou exemples non sensibles',
              'rapports': 'Rapports d audit et controles',
              'data': 'Schemas, exemples JSON/CSV, donnees de test non sensibles',
              'projets': 'Fiches projet obligatoires par application HTML'
          }

          required_files = [
              'README.md',
              'docs/DOSSIER_REFERENCE.md',
              'docs/REGLES_SECURITE.md',
              'docs/STRUCTURE_PROJET.md',
              'docs/METHODE_FICHE_PROJET.md',
              '.gitignore'
          ]

          errors = []
          warnings = []
          lines = []

          lines.append('# Rapport Controle Structure Projet')
          lines.append('')
          lines.append(f'Date : {now}')
          lines.append('')

          lines.append('## 1. Dossiers obligatoires')
          lines.append('')
          lines.append('| Dossier | Statut | Role attendu |')
          lines.append('|---|---|---|')
          for directory, role in required_dirs.items():
              exists = Path(directory).is_dir()
              lines.append(f"| /{directory} | {'OK' if exists else 'MANQUANT'} | {role} |")
              if not exists:
                  errors.append(f'Dossier obligatoire manquant : /{directory}')
          lines.append('')

          lines.append('## 2. Documents de reference')
          lines.append('')
          lines.append('| Fichier | Statut |')
          lines.append('|---|---|')
          for file_path in required_files:
              exists = Path(file_path).is_file()
              lines.append(f"| {file_path} | {'OK' if exists else 'MANQUANT'} |")
              if not exists:
                  errors.append(f'Document obligatoire manquant : {file_path}')
          lines.append('')

          lines.append('## 3. Fichiers sensibles interdits')
          lines.append('')
          forbidden_patterns = [
              r'^\.env$', r'^\.env\.', r'\.pem$', r'\.key$', r'\.p12$', r'\.pfx$', r'\.sqlite$', r'\.db$', r'\.bak$', r'\.backup$'
          ]
          ignored_parts = {'.git', 'node_modules', 'dist', 'build', '.cache', 'tmp', '.tmp'}
          forbidden_files = []
          for path in Path('.').rglob('*'):
              if not path.is_file():
                  continue
              if any(part in ignored_parts for part in path.parts):
                  continue
              if any(re.search(pattern, path.name, re.I) for pattern in forbidden_patterns):
                  forbidden_files.append(str(path))

          if forbidden_files:
              for item in forbidden_files:
                  lines.append(f'- BLOQUANT : `{item}`')
                  errors.append(f'Fichier sensible interdit : {item}')
          else:
              lines.append('OK : aucun fichier sensible interdit detecte.')
          lines.append('')

          lines.append('## 4. Controle secrets dans les sources executables')
          lines.append('')
          secret_pattern = re.compile(
              r'(password\s*=|motdepasse\s*=|mot_de_passe\s*=|api[_-]?key\s*=|apikey\s*=|client[_-]?secret\s*=|connection[_-]?string\s*=|chaine[_-]?connexion\s*=|jdbc:|dsn=|Bearer\s+[A-Za-z0-9._-]+)',
              re.I
          )
          controlled_roots = ['src', 'data', 'exports']
          controlled_suffixes = {'.html', '.js', '.json', '.csv'}
          secret_matches = []
          for base in controlled_roots:
              base_path = Path(base)
              if not base_path.exists():
                  continue
              for path in base_path.rglob('*'):
                  if not path.is_file() or path.suffix.lower() not in controlled_suffixes:
                      continue
                  text = path.read_text(encoding='utf-8', errors='ignore')
                  for number, line in enumerate(text.splitlines(), start=1):
                      if secret_pattern.search(line):
                          secret_matches.append((str(path), number, line.strip()[:160]))

          if secret_matches:
              for path, number, sample in secret_matches:
                  lines.append(f'- BLOQUANT : `{path}:{number}` — `{sample}`')
                  errors.append(f'Secret potentiel detecte : {path}:{number}')
          else:
              lines.append('OK : aucun secret evident detecte dans /src, /data ou /exports.')
          lines.append('')

          lines.append('## 5. Controle logique ERP interdite cote front')
          lines.append('')
          erp_pattern = re.compile(r'(SELECT\s+.*\s+FROM|INSERT\s+INTO|UPDATE\s+.*\s+SET|DELETE\s+FROM|DROP\s+TABLE|CREATE\s+TABLE)', re.I)
          erp_matches = []
          for base in ['src', 'data', 'exports']:
              base_path = Path(base)
              if not base_path.exists():
                  continue
              for path in base_path.rglob('*'):
                  if not path.is_file() or path.suffix.lower() not in controlled_suffixes:
                      continue
                  text = path.read_text(encoding='utf-8', errors='ignore')
                  for number, line in enumerate(text.splitlines(), start=1):
                      if erp_pattern.search(line):
                          erp_matches.append((str(path), number, line.strip()[:160]))

          if erp_matches:
              for path, number, sample in erp_matches:
                  lines.append(f'- BLOQUANT : `{path}:{number}` — `{sample}`')
                  errors.append(f'Logique SQL sensible detectee : {path}:{number}')
          else:
              lines.append('OK : aucune requete SQL sensible detectee dans les fichiers front ou donnees controlees.')
          lines.append('')

          lines.append('## 6. .gitignore')
          lines.append('')
          gitignore = Path('.gitignore').read_text(encoding='utf-8', errors='ignore') if Path('.gitignore').exists() else ''
          required_gitignore = ['.env', 'node_modules', 'dist', 'build', '*.log', '*.db']
          lines.append('| Regle | Statut |')
          lines.append('|---|---|')
          for item in required_gitignore:
              ok = item in gitignore
              lines.append(f"| `{item}` | {'OK' if ok else 'A AJOUTER'} |")
              if not ok:
                  warnings.append(f'Regle absente du .gitignore : {item}')
          lines.append('')

          lines.append('## 7. Verdict')
          lines.append('')
          if errors:
              lines.append('**ROUGE - structure ou securite bloquante a corriger.**')
          elif warnings:
              lines.append('**ORANGE - structure valide avec alertes.**')
          else:
              lines.append('**VERT - structure projet conforme.**')
          lines.append('')

          if errors:
              lines.append('### Erreurs')
              for error in errors:
                  lines.append(f'- {error}')
              lines.append('')
          if warnings:
              lines.append('### Alertes')
              for warning in warnings:
                  lines.append(f'- {warning}')
              lines.append('')

          lines.append('Validation humaine obligatoire avant diffusion ou production.')
          lines.append('')

          report.write_text('\n'.join(lines), encoding='utf-8')
          print('\n'.join(lines[:80]))

          if errors:
              sys.exit(1)
          PY

      - name: Publier le rapport structure projet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-controle-structure-projet
          path: rapports/controle-structure-projet.md
