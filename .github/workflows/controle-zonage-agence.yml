name: Controle Zonage Agence

on:
  push:
    branches: [main]
    paths:
      - 'data/zonage-agence*.json'
      - 'data/stock-mini-maxi*.json'
      - 'scripts/export_zones_tfi.py'
      - '.github/workflows/controle-zonage-agence.yml'
  pull_request:
    branches: [main]
    paths:
      - 'data/zonage-agence*.json'
      - 'data/stock-mini-maxi*.json'
      - 'scripts/export_zones_tfi.py'
      - '.github/workflows/controle-zonage-agence.yml'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  controle-zonage-agence:
    name: Verifier codes zones TFI
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4
      - name: Generer et verifier export TFI
        run: python3 scripts/export_zones_tfi.py
      - name: Publier fichiers de controle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: controle-zonage-agence
          path: |
            exports/tfi-zones-articles.csv
            exports/tfi-zones-articles.controle.json
            exports/tfi-zones-articles.rapport.md
