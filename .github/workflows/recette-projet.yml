name: Recette projet

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  recette:
    name: Contrôles structure, JSON, sécurité, HTML et métier
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Lancer la recette complète
        run: node scripts/run-recette-complete.js

      - name: Publier le rapport de recette
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-recette
          path: rapports/recette/rapport-recette.md
          if-no-files-found: warn

      - name: Publier le rapport des liens HTML locaux
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-liens-html-locaux
          path: rapports/liens-html-locaux.md
          if-no-files-found: warn

      - name: Publier le rapport des fiches projet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-controle-fiche-projet
          path: rapports/controle-fiche-projet.md
          if-no-files-found: warn

      - name: Publier le rapport des CSV critiques
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-controle-csv-critiques
          path: rapports/controle-csv-critiques.md
          if-no-files-found: warn

      - name: Publier le rapport des exemples métier JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-controle-exemples-metier-json
          path: rapports/controle-exemples-metier-json.md
          if-no-files-found: warn
